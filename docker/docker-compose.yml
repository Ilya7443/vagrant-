services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - TZ=Asia/Tashkent
    volumes:
      - /home/vagrant/jellyfin/config:/config
      - /home/vagrant/jellyfin/media:/media
    ports:
      - "8096:8096"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tashkent
      - WEBUI_PORT=8080
      - WEBUI_PASSWORD=admin123
    volumes:
      - /home/vagrant/qbittorrent/config:/config
      # Общая папка: скачанные фильмы сразу видны в Jellyfin
      - /home/vagrant/jellyfin/media:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
